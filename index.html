<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vending Machine</title>
    <!-- นำเข้าฟอนต์แนวอวกาศ/ดิจิทัลจาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- ================= ส่วนของ CSS (Style) ================= -->
    <style>
        /* CSS VARIABLES (กำหนดสีธีม) */
        :root {
            --bg-dark: #090a0f;
            --glass-bg: rgba(20, 22, 40, 0.6);
            --glass-border: rgba(0, 243, 255, 0.3);
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --text-main: #e0e6ed;
        }

        /* GLOBAL STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            /* พื้นหลังตาราง Grid แบบ Cyberpunk */
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* GLASSMORPHISM & NEON */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .neon-border-blue {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .neon-text-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
            margin-bottom: 15px;
            text-align: center;
        }

        .neon-text-pink {
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 0, 234, 0.6);
            margin-bottom: 15px;
        }

        /* TOP DASHBOARD */
        .top-dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-badge.ready, .status-badge.online { 
            background: rgba(0, 255, 100, 0.2); 
            color: #00ff64; 
            border: 1px solid #00ff64; 
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .highlight-text { color: var(--neon-blue); text-align: right; }

        .qr-placeholder {
            height: 120px;
            border: 2px dashed var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
        }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .product-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transform: translateY(-5px);
        }

        .product-title { color: var(--neon-pink); font-size: 1.2rem; margin-bottom: 10px; }
        .product-info { margin-bottom: 5px; font-size: 0.9rem; }

        .btn-buy {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-buy:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-buy:disabled {
            border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; background: transparent;
        }

        /* LOG PANEL */
        .log-window {
            height: 100px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-left: 3px solid var(--neon-pink);
            font-size: 0.9rem;
            color: #aaa;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 768px) {
            .top-dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ================= ส่วนของ HTML (โครงสร้าง) ================= -->
        <!-- Header -->
        <header class="glass-panel neon-border-blue">
            <h1 class="neon-text-blue">SMART VENDING MACHINE</h1>
            <p style="text-align: center;">ระบบควบคุมตู้จำหน่ายสินค้า 18 รางจ่าย (ESP32 IoT)</p>
        </header>

        <!-- Status & Order Panel -->
        <div class="top-dashboard">
            <section class="glass-panel status-panel">
                <h2 class="neon-text-pink">SYSTEM STATUS</h2>
                <div class="status-row">
                    <span>Machine:</span>
                    <span id="machineStatus" class="status-badge ready">READY</span>
                </div>
                <div class="status-row">
                    <span>Network:</span>
                    <span id="onlineStatus" class="status-badge online">ONLINE</span>
                </div>
            </section>

            <section class="glass-panel order-panel">
                <h2 class="neon-text-pink">CURRENT ORDER</h2>
                <table>
                    <tr><td>TXN ID:</td><td id="orderID" class="highlight-text">-</td></tr>
                    <tr><td>Slot:</td><td id="orderSlot" class="highlight-text">-</td></tr>
                    <tr><td>Price:</td><td id="orderPrice" class="highlight-text">0 THB</td></tr>
                    <tr><td>Status:</td><td id="orderStatus" class="highlight-text">WAITING</td></tr>
                </table>
            </section>
            
            <section class="glass-panel qr-panel">
                <h2 class="neon-text-pink">PAYMENT</h2>
                <div id="qrBox" class="qr-placeholder">
                    <span>SELECT ITEM<br>TO SHOW QR</span>
                </div>
            </section>
        </div>

        <!-- Product Grid (จะถูกสร้างอัตโนมัติด้วย JavaScript) -->
        <section class="glass-panel product-section">
            <h2 class="neon-text-blue">PRODUCT SELECTION</h2>
            <div id="productGrid" class="product-grid">
                <!-- JS จะแทรกสินค้า 18 ช่องที่นี่ -->
            </div>
        </section>

        <!-- Activity Log -->
        <section class="glass-panel log-panel">
            <h2 class="neon-text-blue">ACTIVITY LOG</h2>
            <div id="logWindow" class="log-window">
                <!-- JS จะเพิ่ม Log ที่นี่ -->
            </div>
        </section>
    </div>

    <!-- ================= ส่วนของ JavaScript (ระบบการทำงาน) ================= -->
    <script>
        // การตั้งค่าพื้นฐาน
        const TOTAL_SLOTS = 18;
        const DEFAULT_PRICE = 20;
        const INITIAL_STOCK = 18;

        // ดึง Elements จาก HTML มาใช้งาน
        const productGrid = document.getElementById('productGrid');
        const logWindow = document.getElementById('logWindow');
        const orderID = document.getElementById('orderID');
        const orderSlot = document.getElementById('orderSlot');
        const orderPrice = document.getElementById('orderPrice');
        const orderStatus = document.getElementById('orderStatus');
        const qrBox = document.getElementById('qrBox');

        // ฟังก์ชันสร้าง Log
        function addLog(message) {
            const time = new Date().toLocaleTimeString('th-TH');
            const logLine = document.createElement('div');
            logLine.textContent = `[${time}] ${message}`;
            logWindow.prepend(logLine); // แทรกข้อความใหม่ไว้บรรทัดบนสุด
        }

        // ฟังก์ชันสร้างช่องสินค้า 18 ช่อง
        function renderProducts() {
            productGrid.innerHTML = ''; // ล้างค่าเดิม
            
            for (let i = 1; i <= TOTAL_SLOTS; i++) {
                // สร้าง HTML สำหรับการ์ดสินค้า 1 ชิ้น
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3 class="product-title">SLOT ${i}</h3>
                    <p class="product-info">Price: <span style="color:#00ff64">${DEFAULT_PRICE}฿</span></p>
                    <p class="product-info">Stock: <span id="stock-${i}">${INITIAL_STOCK}</span></p>
                    <button class="btn-buy" onclick="handleBuy(${i}, ${DEFAULT_PRICE})">SELECT</button>
                `;
                productGrid.appendChild(card);
            }
            addLog(`System initialized with ${TOTAL_SLOTS} slots.`);
        }

        // ฟังก์ชันเมื่อกดปุ่มซื้อ (จำลองระบบ)
        function handleBuy(slot, price) {
            // 1. ตรวจสอบสต็อกจำลอง (ดึงค่าจาก HTML มาเช็ค)
            const stockElement = document.getElementById(`stock-${slot}`);
            let currentStock = parseInt(stockElement.textContent);
            
            if (currentStock <= 0) {
                addLog(`ERROR: Slot ${slot} is out of stock!`);
                alert(`สินค้ารางที่ ${slot} หมดแล้วครับ`);
                return;
            }

            // 2. สร้าง Transaction ID ใหม่
            const txnId = 'TXN' + Date.now().toString().slice(-6);

            // 3. อัปเดตหน้าปัด Current Order
            orderID.textContent = txnId;
            orderSlot.textContent = `SLOT ${slot}`;
            orderPrice.textContent = `${price} THB`;
            orderStatus.textContent = 'WAITING PAYMENT';
            orderStatus.style.color = 'var(--neon-pink)';

            // 4. แสดงภาพ QR Code (จำลอง)
            qrBox.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=PromptPay_${price}THB" alt="QR Code">`;
            qrBox.style.background = 'white';

            // 5. บันทึก Log
            addLog(`User selected Slot ${slot}. Created ${txnId}. Waiting for payment...`);

            // ========================================================
            // จำลองการชำระเงินสำเร็จ (ในระบบจริง ส่วนนี้จะถูกอัปเดตจาก Firebase/Webhook)
            // ========================================================
            setTimeout(() => {
                // อัปเดตสถานะการสั่งซื้อ
                orderStatus.textContent = 'PAYMENT SUCCESS';
                orderStatus.style.color = '#00ff64';
                
                // ลดสต็อกลง 1
                currentStock--;
                stockElement.textContent = currentStock;
                
                // เคลียร์ QR Code
                qrBox.innerHTML = `<span style="color:#00ff64; font-weight:bold;">DISPENSING...</span>`;
                qrBox.style.background = 'transparent';
                
                addLog(`Payment for ${txnId} received. Dispensing Slot ${slot}. Remaining stock: ${currentStock}`);
                
                // หน่วงเวลาจำลองมอเตอร์หมุนเสร็จ แล้วเคลียร์หน้าปัด
                setTimeout(() => {
                    orderID.textContent = '-';
                    orderSlot.textContent = '-';
                    orderPrice.textContent = '0 THB';
                    orderStatus.textContent = 'READY';
                    orderStatus.style.color = 'var(--neon-blue)';
                    qrBox.innerHTML = `<span>SELECT ITEM<br>TO SHOW QR</span>`;
                    addLog(`Slot ${slot} dispense complete. Ready for next order.`);
                }, 3000);

            }, 5000); // จำลองว่าลูกค้าสแกนจ่ายเงินภายใน 5 วินาที
        }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเว็บเสร็จ
        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
