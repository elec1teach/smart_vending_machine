<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vending Machine</title>
    <!-- นำเข้าฟอนต์แนวอวกาศ/ดิจิทัลจาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* CSS VARIABLES */
        :root {
            --bg-dark: #090a0f;
            --glass-bg: rgba(20, 22, 40, 0.6);
            --glass-border: rgba(0, 243, 255, 0.3);
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --text-main: #e0e6ed;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .neon-border-blue {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .neon-text-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
            margin-bottom: 15px;
            text-align: center;
        }

        .neon-text-pink {
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 0, 234, 0.6);
            margin-bottom: 15px;
        }

        .top-dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .status-badge {
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-badge.ready, .status-badge.online { 
            background: rgba(0, 255, 100, 0.2); 
            color: #00ff64; 
            border: 1px solid #00ff64; 
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .highlight-text { color: var(--neon-blue); text-align: right; }

        .qr-placeholder {
            height: 120px;
            border: 2px dashed var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            overflow: hidden; 
            margin-bottom: 15px;
        }

        /* ตกแต่งส่วนอัปโหลดสลิป */
        .slip-upload-section {
            display: none; /* ซ่อนไว้ก่อน จะโชว์เมื่อ QR มา */
            text-align: center;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-file-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
        }

        .product-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .product-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            width: 250px; 
        }

        .product-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transform: translateY(-5px);
        }

        .product-title { color: var(--neon-pink); font-size: 1.5rem; margin-bottom: 10px; }
        .product-info { margin-bottom: 5px; font-size: 1.1rem; }

        .btn-buy {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-buy:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .log-window {
            height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-left: 3px solid var(--neon-pink);
            font-size: 0.9rem;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .top-dashboard { grid-template-columns: 1fr; }
            .product-grid { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass-panel neon-border-blue">
            <h1 class="neon-text-blue">SMART VENDING MACHINE</h1>
            <p style="text-align: center;">ระบบควบคุมตู้จำหน่ายสินค้า (Coke & Pepsi)</p>
        </header>

        <!-- Status & Order Panel -->
        <div class="top-dashboard">
            <section class="glass-panel status-panel">
                <h2 class="neon-text-pink">SYSTEM STATUS</h2>
                <div class="status-row">
                    <span>Machine:</span>
                    <span id="machineStatus" class="status-badge ready">READY</span>
                </div>
                <div class="status-row">
                    <span>Network:</span>
                    <span id="onlineStatus" class="status-badge online">ONLINE</span>
                </div>
            </section>

            <section class="glass-panel order-panel">
                <h2 class="neon-text-pink">CURRENT ORDER</h2>
                <table>
                    <tr><td>TXN ID:</td><td id="orderID" class="highlight-text">-</td></tr>
                    <tr><td>Item:</td><td id="orderSlot" class="highlight-text">-</td></tr>
                    <tr><td>Price:</td><td id="orderPrice" class="highlight-text">0 THB</td></tr>
                    <tr><td>Status:</td><td id="orderStatus" class="highlight-text">WAITING</td></tr>
                </table>
            </section>
            
            <section class="glass-panel qr-panel">
                <h2 class="neon-text-pink">PAYMENT</h2>
                <div id="qrBox" class="qr-placeholder">
                    <span>SELECT ITEM<br>TO SHOW QR</span>
                </div>
                
                <!-- ส่วนอัปโหลดสลิปที่เพิ่มเข้ามาใหม่ -->
                <div id="slipUploadSection" class="slip-upload-section">
                    <p style="font-size: 0.9rem; margin-bottom: 8px; color: var(--neon-pink);">UPLOAD SLIP (โอนแล้วแนบสลิปที่นี่)</p>
                    <input type="file" id="slipFile" accept="image/*" class="neon-file-input">
                    <button onclick="uploadSlipToServer()" class="btn-buy" style="margin-top: 5px;">VERIFY SLIP</button>
                    <p id="uploadStatus" style="color: var(--neon-blue); margin-top: 10px; font-weight: bold; font-size: 0.9rem;"></p>
                </div>
            </section>
        </div>

        <!-- Product Grid -->
        <section class="glass-panel product-section">
            <h2 class="neon-text-blue">DRINK SELECTION</h2>
            <div id="productGrid" class="product-grid">
                <!-- JS จะแทรกสินค้า 2 ช่องที่นี่ -->
            </div>
        </section>

        <!-- Activity Log -->
        <section class="glass-panel log-panel">
            <h2 class="neon-text-blue">ACTIVITY LOG</h2>
            <div id="logWindow" class="log-window">
                <!-- JS จะเพิ่ม Log ที่นี่ -->
            </div>
        </section>
    </div>

    <!-- นำเข้า Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // -----------------------------------------
        // ตัวแปร Global ของระบบ
        // -----------------------------------------
        // ⚠️ นำ URL ของเว็บแอปจาก GAS มาวางแทนที่ข้อความด้านล่างนี้ ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyJXSpLn5UKV4IazLX9gPDghXgyn26EopP9NVXA0qW561Zj2TRbUZ-rpsESUo2k0-F6Wg/exec"; 
        let currentTxnId = ""; // ตัวแปรเก็บรหัสออเดอร์ปัจจุบัน
        let currentOrderRef = null;

        // -----------------------------------------
        // 1. ตั้งค่า Firebase Configuration
        // -----------------------------------------
        const firebaseConfig = {
           apiKey: "AIzaSyBsoKa_Mu668Sj7J68XMB1ygEgCMSs_lOo",
           authDomain: "smartvendingmachine-845a8.firebaseapp.com",
           databaseURL: "https://smartvendingmachine-845a8-default-rtdb.asia-southeast1.firebasedatabase.app",
           projectId: "smartvendingmachine-845a8",
           storageBucket: "smartvendingmachine-845a8.firebasestorage.app",
           messagingSenderId: "443783652574",
           appId: "1:443783652574:web:53732ad9907c9f42470e4f"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // -----------------------------------------
        // 2. ข้อมูลสินค้าและการจัดการ UI
        // -----------------------------------------
        const products = [
            { slot: 1, name: "Coke", price: 20, stock: 18 },
            { slot: 2, name: "Pepsi", price: 20, stock: 18 }
        ];

        const productGrid = document.getElementById('productGrid');
        const logWindow = document.getElementById('logWindow');
        const orderID = document.getElementById('orderID');
        const orderSlot = document.getElementById('orderSlot');
        const orderPrice = document.getElementById('orderPrice');
        const orderStatus = document.getElementById('orderStatus');
        const qrBox = document.getElementById('qrBox');
        
        // Element ของส่วน Slip Upload
        const slipUploadSection = document.getElementById('slipUploadSection');
        const uploadStatus = document.getElementById('uploadStatus');
        const slipFile = document.getElementById('slipFile');

        function addLog(message) {
            const time = new Date().toLocaleTimeString('th-TH');
            const logLine = document.createElement('div');
            logLine.textContent = `[${time}] ${message}`;
            logWindow.prepend(logLine);
        }

        function renderProducts() {
            productGrid.innerHTML = ''; 
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3 class="product-title">SLOT ${product.slot}: ${product.name}</h3>
                    <p class="product-info">Price: <span style="color:#00ff64">${product.price}฿</span></p>
                    <p class="product-info">Stock: <span id="stock-${product.slot}">${product.stock}</span></p>
                    <button class="btn-buy" onclick="handleBuy(${product.slot}, '${product.name}', ${product.price})">SELECT</button>
                `;
                productGrid.appendChild(card);
            });
            addLog(`System initialized with ${products.length} products (Coke & Pepsi).`);
        }

        function resetDashboard() {
            orderID.textContent = '-';
            orderSlot.textContent = '-';
            orderPrice.textContent = '0 THB';
            orderStatus.textContent = 'READY';
            orderStatus.style.color = 'var(--neon-blue)';
            qrBox.innerHTML = `<span>SELECT ITEM<br>TO SHOW QR</span>`;
            qrBox.style.background = 'rgba(0,0,0,0.3)';
            
            // รีเซ็ตส่วนอัปโหลดสลิป
            currentTxnId = "";
            slipUploadSection.style.display = 'none';
            uploadStatus.innerText = "";
            slipFile.value = "";
        }

        // -----------------------------------------
        // 3. ฟังก์ชันการทำงานร่วมกับ Firebase
        // -----------------------------------------
        function createOrderInFirebase(txnId, slot, name, price) {
            currentOrderRef = database.ref('orders/' + txnId);
            
            currentOrderRef.set({
                slot: slot,
                product: name,
                price: price,
                status: "waiting",
                timestamp: Date.now()
            });

            addLog(`Firebase: Created order ${txnId} (Status: waiting)`);
            listenForPaymentStatus(txnId, name, slot);
        }

        function listenForPaymentStatus(txnId, name, slot) {
            currentOrderRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (data.status === 'paid') {
                        orderStatus.textContent = 'PAYMENT SUCCESS';
                        orderStatus.style.color = '#00ff64';
                        qrBox.innerHTML = `<span style="color:#00ff64; font-weight:bold;">DISPENSING...</span>`;
                        qrBox.style.background = 'transparent';
                        
                        // ซ่อนปุ่มอัปโหลดสลิปทันทีที่จ่ายสำเร็จ
                        slipUploadSection.style.display = 'none';
                        
                        const stockElement = document.getElementById(`stock-${slot}`);
                        let currentStock = parseInt(stockElement.textContent);
                        stockElement.textContent = currentStock - 1;

                        addLog(`Firebase: Status 'paid'. Hardware is dispensing ${name}.`);
                    } 
                    else if (data.status === 'success') {
                        orderStatus.textContent = 'THANK YOU';
                        addLog(`Firebase: Status 'success'. ${name} dispense complete.`);
                        
                        setTimeout(() => {
                            resetDashboard();
                        }, 3000);
                        
                        currentOrderRef.off();
                    }
                }
            });
        }

        // -----------------------------------------
        // 4. ฟังก์ชันจัดการการสั่งซื้อ
        // -----------------------------------------
        function handleBuy(slot, name, price) {
            const stockElement = document.getElementById(`stock-${slot}`);
            let currentStock = parseInt(stockElement.textContent);
            
            if (currentStock <= 0) {
                addLog(`ERROR: ${name} (Slot ${slot}) is out of stock!`);
                alert(`${name} หมดแล้วครับ!`);
                return;
            }

            // สร้างรหัสออเดอร์และเก็บไว้ใน Global Variable
            currentTxnId = 'TXN' + Date.now().toString().slice(-6);

            orderID.textContent = currentTxnId;
            orderSlot.textContent = `Slot ${slot} - ${name}`;
            orderPrice.textContent = `${price} THB`;
            orderStatus.textContent = 'WAITING PAYMENT';
            orderStatus.style.color = 'var(--neon-pink)';

            qrBox.innerHTML = `<span style="color:var(--neon-blue);">GENERATING QR...</span>`;
            qrBox.style.background = 'rgba(0,0,0,0.3)';
            
            // ซ่อนปุ่มอัปโหลดสลิปไว้ก่อนระหว่างรอโหลด QR
            slipUploadSection.style.display = 'none';

            addLog(`User selected ${name}. Requesting QR from GAS...`);
            
            // ขอ QR Code จาก GAS
            fetch(`${GAS_URL}?amount=${price}&txnId=${currentTxnId}`)
                .then(response => response.json())
                .then(data => {
                    if(data.status === "success") {
                        qrBox.innerHTML = `<img src="${data.qrUrl}" alt="PromptPay QR Code" style="max-width:100%; max-height:100%;">`;
                        qrBox.style.background = 'white';
                        addLog(`QR Generated for ${currentTxnId}. Waiting for customer to scan.`);
                        
                        // แสดงปุ่มอัปโหลดสลิปเมื่อ QR พร้อมแล้ว
                        slipUploadSection.style.display = 'block';
                        
                        createOrderInFirebase(currentTxnId, slot, name, price);
                    } else {
                        addLog(`Error from GAS: ${data.error}`);
                    }
                })
                .catch(error => {
                    addLog(`Fetch Error: ${error}`);
                    qrBox.innerHTML = `<span style="color:red;">ERROR LOADING QR</span>`;
                });
        }

        // -----------------------------------------
        // 5. ฟังก์ชันอัปโหลดและตรวจสอบสลิป (ใหม่!)
        // -----------------------------------------
        function uploadSlipToServer() {
            if (slipFile.files.length === 0) {
                uploadStatus.style.color = "red";
                uploadStatus.innerText = "กรุณาเลือกไฟล์สลิปก่อนครับ";
                return;
            }

            if (!currentTxnId) {
                uploadStatus.style.color = "red";
                uploadStatus.innerText = "ไม่พบรายการสั่งซื้อ กรุณากดเลือกสินค้าใหม่";
                return;
            }

            const file = slipFile.files[0];
            const reader = new FileReader();

            uploadStatus.style.color = "var(--neon-blue)";
            uploadStatus.innerText = "กำลังตรวจสอบสลิป... กรุณารอสักครู่";
            addLog(`Reading slip image for ${currentTxnId}...`);

            // เมื่อ FileReader อ่านไฟล์เสร็จ จะทำงานในนี้
            reader.onload = function(event) {
                // ตัดเอาเฉพาะส่วนข้อมูล Base64 บริสุทธิ์
                const base64Data = event.target.result.split(',')[1]; 

                addLog("Sending slip image to GAS for verification...");

                // ยิงข้อมูลไปที่ GAS_URL เดิม แต่ใช้แบบ POST Request
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'verifySlip',
                        image: base64Data,
                        txnId: currentTxnId
                    })
                })
                .then(res => res.json())
                .then(response => {
                    if(response.success) {
                        uploadStatus.style.color = "#00ff64";
                        uploadStatus.innerText = "✅ ตรวจสอบสำเร็จ! ตู้กำลังจ่ายสินค้า...";
                        slipUploadSection.style.display = 'none'; // ซ่อนปุ่มอัปโหลด
                        addLog(`Slip verified successfully!`);
                    } else {
                        uploadStatus.style.color = "red";
                        uploadStatus.innerText = "❌ เกิดข้อผิดพลาด: " + response.message;
                        addLog(`Slip verification failed: ${response.message}`);
                    }
                })
                .catch(err => {
                    uploadStatus.style.color = "red";
                    uploadStatus.innerText = "❌ การเชื่อมต่อขัดข้อง กรุณาลองใหม่";
                    addLog(`Upload Error: ${err}`);
                });
            };
            
            // สั่งให้อ่านไฟล์ในรูปแบบ Data URL
            reader.readAsDataURL(file);
        }

        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
